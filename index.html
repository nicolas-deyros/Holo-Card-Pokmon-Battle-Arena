<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Card Battle Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* For custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      
      /* Animations */
      @keyframes shake {
        10%, 90% { transform: translateX(-2px); }
        20%, 80% { transform: translateX(2px); }
        30%, 50%, 70% { transform: translateX(-4px); }
        40%, 60% { transform: translateX(4px); }
      }
      .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

      @keyframes fade-in-scale {
        0% { opacity: 0; transform: scale(0.97); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-fade-in-scale { animation: fade-in-scale 0.4s ease-out forwards; }
      
      @keyframes gradient-animation {
        0%{background-position:0% 50%}
        50%{background-position:100% 50%}
        100%{background-position:0% 50%}
      }
      .animated-bg{
        background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #475569);
        background-size: 400% 400%;
        animation: gradient-animation 15s ease infinite;
      }
    </style>
    <style>
      /* Holo Card Effect */
      :root {
        --color1: rgb(0, 231, 255);
        --color2: rgb(255, 0, 231);
        --poke-bg-image: url(https://assets.codepen.io/13471/charizard-gx.webp);
      }

      .card-wrapper {
        perspective: 1000px;
        isolation: isolate;
      }
      
      .holo-card {
        width: 100%;
        /* Let's use aspect ratio to maintain shape */
        aspect-ratio: 63 / 88;
        position: relative;
        overflow: hidden;
        z-index: 10;
        touch-action: none;
        
        border-radius: 5% / 3.5%;
        box-shadow: 
          -5px -5px 5px -5px var(--color1), 
          5px 5px 5px -5px var(--color2), 
          -7px -7px 10px -5px transparent, 
          7px 7px 10px -5px transparent, 
          0 0 5px 0px rgba(255,255,255,0),
          0 55px 35px -20px rgba(0, 0, 0, 0.5);
        
        transition: transform 0.1s ease, box-shadow 0.2s ease;
        will-change: transform, filter;
        
        background-color: #1e293b;
        background-image: var(--poke-bg-image);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: 50% 50%;
        transform-origin: center;
      }

      .card-wrapper:hover .holo-card {
        transition: transform 0.05s ease, box-shadow 0.2s ease;
        box-shadow: 
          -20px -20px 30px -25px var(--color1), 
          20px 20px 30px -25px var(--color2), 
          -7px -7px 10px -5px var(--color1), 
          7px 7px 10px -5px var(--color2), 
          0 0 13px 4px rgba(255,255,255,0.3),
          0 55px 35px -20px rgba(0, 0, 0, 0.5);
      }
      
      .holo-card:before,
      .holo-card:after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        top: 0;
        background-repeat: no-repeat;
        opacity: .5;
        mix-blend-mode: color-dodge;
        transition: all .33s ease;
        z-index: 1;
      }
      
      .holo-card:before {
        background-position: 50% 50%;
        background-size: 300% 300%;
        background-image: linear-gradient(
          115deg,
          transparent 0%,
          var(--color1) 25%,
          transparent 47%,
          transparent 53%,
          var(--color2) 75%,
          transparent 100%
        );
        opacity: .5;
        filter: brightness(.5) contrast(1);
      }
      
      .holo-card:after {
        opacity: 1;
        background-image: url("https://assets.codepen.io/13471/sparkles.gif"), 
          url(https://assets.codepen.io/13471/holo.png), 
          linear-gradient(125deg, #ff008450 15%, #fca40040 30%, #ffff0030 40%, #00ff8a20 60%, #00cfff40 70%, #cc4cfa50 85%);
        background-position: 50% 50%;
        background-size: 160%;
        background-blend-mode: overlay;
        z-index: 2;
        filter: brightness(1) contrast(1);
        transition: all .33s ease;
        mix-blend-mode: color-dodge;
        opacity: .75;
      }
      
      .card-wrapper:hover .holo-card:after {
        filter: brightness(1) contrast(1);;
        opacity: 1;
      }
      
      .card-wrapper:hover .holo-card:before {
        background-image: linear-gradient(
          110deg,
          transparent 25%,
          var(--color1) 48%,
          var(--color2) 52%,
          transparent 75%
        );
        background-position: var(--x) var(--y);
        background-size: 250% 250%;
        opacity: .88;
        filter: brightness(.66) contrast(1.33);
        transition: none;
      }

      .card-wrapper:hover .holo-card:after {
        background-position: var(--x) var(--y);
        transition: none;
      }

      /* UI Elements inside the card */
      .holo-card-content {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.25rem;
        color: white;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
      }
      
      .holo-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .holo-card-name {
        font-size: 1.5rem;
        font-weight: bold;
        text-transform: capitalize;
      }
      
      .holo-card-hp-info {
        text-align: right;
      }

      .holo-card-hp-text {
        font-size: 0.875rem;
        font-weight: bold;
        color: #fef2f2;
      }

      .holo-card-hp-value {
        font-size: 1.25rem;
        font-weight: bold;
      }
      
      .holo-card-hp-bar-container {
        width: 100px;
        background-color: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 9999px;
        height: 0.75rem;
        margin-top: 0.25rem;
      }
      
      .holo-card-hp-bar {
        height: 100%;
        border-radius: 9999px;
        transition: width 0.5s ease-in-out;
      }
      
      .holo-card-footer {
        background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
        margin: -1.25rem;
        padding: 1.25rem;
        padding-top: 2rem;
        border-bottom-left-radius: 5%;
        border-bottom-right-radius: 5%;
      }
      
      .holo-card-attacks {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
      
      .holo-card-attack-btn {
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.375rem;
        padding: 0.5rem;
        text-align: left;
        transition: all 0.2s ease;
        backdrop-filter: blur(2px);
      }
      
      .holo-card-attack-btn:hover:not(:disabled) {
        background-color: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        transform: scale(1.05);
      }
      
      .holo-card-attack-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      
      .holo-card-attack-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .holo-card-attack-name {
        font-weight: 600;
        text-transform: capitalize;
        font-size: 0.8rem;
      }
      
      .holo-card-attack-power {
        font-weight: 800;
        font-size: 1.1rem;
      }

      .holo-card .type-badge-container {
          display: flex;
          gap: 4px;
          margin-top: 4px;
      }
    </style>
