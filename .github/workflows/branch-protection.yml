name: Branch Protection

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  branch-protection:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Check Direct Push to Protected Branch
        run: |
          echo "🚫 ERROR: Direct push to protected branch detected!"
          echo "This workflow will fail to remind you to use Pull Requests."
          echo ""
          echo "Proper workflow:"
          echo "1. Create a feature branch"
          echo "2. Push your changes to the feature branch"
          echo "3. Create a Pull Request"
          echo "4. Merge via PR after review"
          exit 1

  pull-request-checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run type-check

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build project
        run: npm run build

      - name: PR Protection Success
        run: |
          echo "✅ All checks passed!"
          echo "This Pull Request is ready for review."
